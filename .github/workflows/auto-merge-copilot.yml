name: Auto-Merge Copilot PRs

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge ready non-draft PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_PRS=$(gh pr list --repo ${{ github.repository }} --state open --json number,isDraft,mergeable,title 2>/dev/null || echo '[]')
          echo "$OPEN_PRS" | jq -r '.[] | select(.isDraft == false) | .number' | while read PR_NUM; do
            MERGEABLE=$(echo "$OPEN_PRS" | jq -r --argjson n "$PR_NUM" '.[] | select(.number == $n) | .mergeable')
            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "Merging PR #$PR_NUM..."
              gh pr merge "$PR_NUM" --repo ${{ github.repository }} --squash --auto --delete-branch 2>/dev/null || true
            else
              echo "PR #$PR_NUM is not mergeable (status: $MERGEABLE), skipping"
            fi
          done
