# AWS ECS Deploy Workflow
# STATUS: DISABLED - requires real AWS infrastructure setup
# To enable:
#   1. Set AWS_REGION, ECR_REPOSITORY, ECS_SERVICE, ECS_CLUSTER, ECS_TASK_DEFINITION, CONTAINER_NAME env vars below
#   2. Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to repo secrets
#   3. Change the 'on' trigger from workflow_dispatch only back to push

name: Deploy to Amazon ECS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm AWS deploy (requires AWS secrets to be set)'
        required: true
        default: 'NO'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tree-of-life-system
  ECS_SERVICE: tree-of-life-service
  ECS_CLUSTER: tree-of-life-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: tree-of-life-app

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS secrets exist
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "ERROR: AWS_ACCESS_KEY_ID secret not set"
            exit 1
          fi
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "ERROR: AWS_SECRET_ACCESS_KEY secret not set"
            exit 1
          fi
          echo "AWS secrets present, proceeding..."

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
