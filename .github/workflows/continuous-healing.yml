name: Continuous Healing

on:
  schedule:
    - cron: '15 5 * * *'
  workflow_dispatch:

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Health check
        run: |
          echo "Running continuous healing check..."
          if [ -f scripts/health-check.js ]; then
            node scripts/health-check.js || echo "Health check script returned non-zero"
          elif [ -f scripts/health-check.sh ]; then
            bash scripts/health-check.sh || echo "Health check script returned non-zero"
          else
            echo "No health check script found — system is assumed healthy"
          fi
          echo "Healing cycle complete"
