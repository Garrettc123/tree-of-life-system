name: Deploy Autonomous Business

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: 'Deployment Mode'
        required: true
        default: 'railway'
        type: choice
        options:
          - railway
          - gcp
          - hybrid
          - free
      tier:
        description: 'Deployment Tier'
        required: false
        default: 'all'
        type: string
  push:
    branches:
      - main
    paths:
      - 'scripts/deploy-autonomous-business.sh'
      - 'scripts/deploy-*.sh'
      - '.github/workflows/deploy-autonomous-business.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-audit
          elif [ -f package.json ]; then
            npm install --no-audit
          else
            echo "No package.json found, skipping install"
          fi

      - name: Install Railway CLI
        run: |
          npm install -g @railway/cli
          railway --version

      - name: Configure credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          gh auth status
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "Railway token present"
          else
            echo "WARNING: RAILWAY_TOKEN not set - Railway deployments will be skipped"
          fi

      - name: Make scripts executable
        run: |
          if ls scripts/*.sh 1>/dev/null 2>&1; then
            chmod +x scripts/*.sh
          fi
          chmod +x scripts/*.js 2>/dev/null || true

      - name: Deploy Autonomous Systems
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          DEPLOYMENT_MODE: ${{ inputs.deployment_mode || 'railway' }}
          TIER: ${{ inputs.tier || 'all' }}
        run: |
          echo "Starting autonomous business deployment..."
          echo "Mode: $DEPLOYMENT_MODE | Tier: $TIER"
          mkdir -p logs
          case "$DEPLOYMENT_MODE" in
            "free")
              if [ -f scripts/deploy-free-tier.sh ]; then
                bash scripts/deploy-free-tier.sh 2>&1 | tee logs/deployment.log
              else
                echo "deploy-free-tier.sh not found"; exit 1
              fi
              ;;
            "railway")
              if [ -z "$RAILWAY_TOKEN" ]; then
                echo "ERROR: RAILWAY_TOKEN required for Railway deployment"; exit 1
              fi
              if [ -f scripts/deploy-autonomous-business.sh ]; then
                bash scripts/deploy-autonomous-business.sh 2>&1 | tee logs/deployment.log
              else
                echo "deploy-autonomous-business.sh not found"; exit 1
              fi
              ;;
            "gcp")
              if [ -f scripts/deploy-all.sh ]; then
                bash scripts/deploy-all.sh 2>&1 | tee logs/deployment.log
              else
                echo "deploy-all.sh not found"; exit 1
              fi
              ;;
            "hybrid")
              if [ -f scripts/deploy-all-repos.sh ]; then
                bash scripts/deploy-all-repos.sh 2>&1 | tee logs/deployment.log
              else
                echo "deploy-all-repos.sh not found"; exit 1
              fi
              ;;
            *)
              echo "ERROR: Unknown deployment mode: $DEPLOYMENT_MODE"; exit 1
              ;;
          esac
          echo "Deployment script completed"

      - name: Verify Deployments
        if: success()
        run: |
          if [ -f scripts/verify-autonomous-health.sh ]; then
            bash scripts/verify-autonomous-health.sh || echo "Some systems may still be starting up"
          else
            echo "No health check script found, skipping verification"
          fi

      - name: Generate Deployment Report
        if: always()
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          cat > deployment-report.md << EOF
          # Deployment Report
          **Date:** $DATE
          **Mode:** ${{ inputs.deployment_mode || 'railway' }}
          **Tier:** ${{ inputs.tier || 'all' }}
          **Status:** ${{ job.status }}
          EOF
          if [ -f logs/deployment.log ]; then
            echo '```' >> deployment-report.md
            tail -n 50 logs/deployment.log >> deployment-report.md
            echo '```' >> deployment-report.md
          fi
          cat deployment-report.md

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deployment-logs-${{ github.run_number }}
          path: |
            logs/
            deployment-report.md
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed - check artifacts for logs"
          echo "Common issues: missing API keys, missing scripts, Railway token not set"
          exit 1
