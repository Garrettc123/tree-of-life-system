name: Deploy Orchestration Engine

on:
  push:
    branches:
      - main
    paths:
      - "orchestration-engine/**"
      - ".github/workflows/deploy-orchestration.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-orchestration-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_USER: Garrettc123
  EMAIL: gwc2780@gmail.com
  PROJECT_ID: e3b5cb0e-d4f1-4326-801f-e936d99d231a
  SERVICE_ID: f6619604-8a7d-4ff1-9b62-264139e17e96

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | bash
          echo "${HOME}/.railway/bin" >> "${GITHUB_PATH}"

      - name: Verify Railway CLI
        run: railway --version

      - name: Validate orchestration-engine
        run: |
          test -f orchestration-engine/main.py || { echo "Missing orchestration-engine/main.py"; exit 1; }
          test -f orchestration-engine/requirements.txt || { echo "Missing orchestration-engine/requirements.txt"; exit 1; }
          python -m py_compile orchestration-engine/main.py
          echo "Syntax OK"

      - name: Link Railway project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link --project ${{ env.PROJECT_ID }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          railway up --service ${{ env.SERVICE_ID }} --detach
          echo "Deploy dispatched to service ${{ env.SERVICE_ID }}"

      - name: Tail deploy logs
        if: always()
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          sleep 20
          railway logs --service ${{ env.SERVICE_ID }} --tail 80 || true
