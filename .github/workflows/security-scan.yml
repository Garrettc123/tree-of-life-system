name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan for secrets
        run: |
          echo "Scanning for leaked secrets..."
          SECRETS_FOUND=0

          for PATTERN in "sk-" "ghp_" "sk_live_" "railway_" "AKIA"; do
            if git log --all -S "$PATTERN" --oneline 2>/dev/null | head -n 1 | grep -q .; then
              echo "WARNING: Pattern '$PATTERN' found in git history"
              SECRETS_FOUND=1
            else
              echo "OK: No '$PATTERN' pattern found"
            fi
          done

          if [ $SECRETS_FOUND -eq 1 ]; then
            echo "SECURITY ALERT: Potential secrets detected - rotate any exposed keys"
          else
            echo "Secret scan completed - no patterns found"
          fi

      - name: Check for sensitive files
        run: |
          echo "Checking for sensitive files..."
          ISSUES_FOUND=0

          if [ -f ".env" ]; then
            echo "ERROR: .env file found in repository!"
            ISSUES_FOUND=1
          else
            echo "OK: No .env file in repo"
          fi

          if [ -f ".gitignore" ]; then
            if grep -qE "^\.env" .gitignore; then
              echo "OK: .env is in .gitignore"
            else
              echo "WARNING: .env not in .gitignore"
              ISSUES_FOUND=1
            fi
          else
            echo "WARNING: No .gitignore found"
          fi

          find . -name "*.pem" -o -name "*.key" -o -name "*_rsa" 2>/dev/null \
            | grep -v node_modules | grep -v .git \
            | while read f; do echo "WARNING: Private key file found: $f"; done

          if [ $ISSUES_FOUND -eq 0 ]; then
            echo "File sensitivity check passed"
          fi

      - name: Dependency audit
        continue-on-error: true
        run: |
          if [ -f "package.json" ]; then
            npm audit --audit-level=moderate || echo "Vulnerabilities found (see above)"
          else
            echo "No package.json found, skipping npm audit"
          fi

      - name: Repository security check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_INFO=$(gh api repos/${{ github.repository }} 2>/dev/null || echo '{}')
          IS_PRIVATE=$(echo "$REPO_INFO" | jq -r '.private // false')
          if [ "$IS_PRIVATE" = "true" ]; then
            echo "Repository is private"
          else
            echo "Repository is PUBLIC - ensure no secrets are committed"
          fi

      - name: Create security report
        if: always()
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          cat > security-report.md << EOF
          # Security Scan Report
          **Date:** $DATE
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref_name }}
          **Triggered by:** ${{ github.event_name }}
          EOF
          cat security-report.md

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report-${{ github.run_number }}
          path: |
            security-report.md
            trivy-results.sarif
          retention-days: 90
