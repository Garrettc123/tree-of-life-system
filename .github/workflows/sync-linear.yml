name: Auto-Sync to Linear

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "**/*.md"
      - "reports/**"
      - "templates/**"
  pull_request:
    branches:
      - main

concurrency:
  group: linear-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_USER: Garrettc123
  EMAIL: gwc2780@gmail.com

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Sync to Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -f scripts/github-to-linear.py ]; then
            python scripts/github-to-linear.py
          else
            echo "scripts/github-to-linear.py not found — skipping"
          fi
