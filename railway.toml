[build]
builder = "NIXPACKS"
build_command = "pip install -r orchestrator/requirements.txt"

[deploy]
start_command = "python -m uvicorn orchestrator.main:app --host 0.0.0.0 --port ${PORT:-8001}"
restart_policy_type = "ON_FAILURE"
restart_policy_max_retries = 10

[healthcheck]
path = "/health"
interval = 60
timeout = 10

